 <!-- ================== CARD SABORES ================== -->
  <div class="card border-0 shadow-sm mb-4">
    <div class="card-body p-3">

      <h2>Sabores</h2>

      <div class="herramientas">
        <mat-form-field appearance="outline">
          <mat-label>Buscar Sabores</mat-label>
          <input matInput type="text" [(ngModel)]="filtroSabores" (input)="filtrarSabores()" />
        </mat-form-field>

        <button mat-raised-button color="primary" (click)="abrirModalAgregarSabor()">
          <mat-icon>add</mat-icon> Agregar Sabor
        </button>

        <button mat-raised-button color="accent" (click)="cargarSabores()">
          <mat-icon>refresh</mat-icon>
        </button>
      </div>

      <div class="tabla-container">
        <table mat-table [dataSource]="saboresPaginaActual">

          <ng-container matColumnDef="id">
            <th mat-header-cell *matHeaderCellDef>Id</th>
            <td mat-cell *matCellDef="let sabor">{{ sabor.IDSabor }}</td>
          </ng-container>

          <ng-container matColumnDef="nombre">
            <th mat-header-cell *matHeaderCellDef>Nombre</th>
            <td mat-cell *matCellDef="let sabor">{{ sabor.Nombre }}</td>
          </ng-container>

          <ng-container matColumnDef="plato">
            <th mat-header-cell *matHeaderCellDef>Plato</th>
            <td mat-cell *matCellDef="let sabor">{{ sabor.Plato }}</td>
          </ng-container>

          <ng-container matColumnDef="estado">
            <th mat-header-cell *matHeaderCellDef>Estado</th>
            <td mat-cell *matCellDef="let sabor">
              <span [class.activo]="sabor.Estado" [class.inactivo]="!sabor.Estado">
                {{ sabor.Estado ? 'Activo' : 'Inactivo' }}
              </span>
            </td>
          </ng-container>

          <ng-container matColumnDef="acciones">
            <th mat-header-cell *matHeaderCellDef>Acciones</th>
            <td mat-cell *matCellDef="let sabor">

              <button *ngIf="!sabor.Estado" mat-icon-button color="primary" (click)="activarSabor(sabor)">
                <mat-icon>restore</mat-icon>
              </button>

              <ng-container *ngIf="sabor.Estado">
                <button mat-icon-button color="primary" (click)="abrirModalEditarSabor(sabor)">
                  <mat-icon>edit</mat-icon>
                </button>
                <button mat-icon-button color="warn" (click)="eliminarSabor(sabor)">
                  <mat-icon>delete</mat-icon>
                </button>
              </ng-container>

            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="columnasSabores"></tr>
          <tr mat-row *matRowDef="let row; columns: columnasSabores;"></tr>
        </table>
      </div>

      <mat-paginator [length]="saboresFiltrados.length" [pageSize]="itemsPorPaginaSabores"
        [pageIndex]="paginaActualSabores" (page)="cambiarPaginaSabores($event)">
      </mat-paginator>

    </div>
  </div>
 <!-- Modal para agregar/editar sabores -->
  <div *ngIf="mostrarModalSabor" class="modal">
    <div class="modal-contenido">
      <h3>{{ modalTituloSabor }}</h3>
      <form (ngSubmit)="guardarSabor()" #saborForm="ngForm">
        <!-- Campo Nombre -->
        <mat-form-field appearance="outline">
          <mat-label>Nombre del Sabor</mat-label>
          <input matInput type="text" [(ngModel)]="saborSeleccionado.Nombre" name="nombreSabor" required />
        </mat-form-field>

        <!-- Campo Plato (Select) -->
        <mat-form-field appearance="outline">
          <mat-label>Plato</mat-label>
          <mat-select [(ngModel)]="saborSeleccionado.IdPlato" name="platoSelect" required>
            <mat-option *ngFor="let plato of platos" [value]="plato.idPlato">
              {{ plato.nombre }}
            </mat-option>
          </mat-select>
        </mat-form-field>

        <!-- Botones del modal -->
        <div class="modal-botones">
          <button mat-raised-button type="button" (click)="cerrarModalSabor()">
            <mat-icon>cancel</mat-icon> Cancelar
          </button>
          <button mat-raised-button type="submit" color="primary" [disabled]="saborForm.invalid">
            <mat-icon>save</mat-icon> Guardar
          </button>
        </div>
      </form>
    </div>
  </div>
