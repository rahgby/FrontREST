<div class="contenedor-principal">
  <h2 class = "titulo" >Gestión de Suministro</h2>
  <!-- Spinner -->
  <div class="spinner-overlay" *ngIf="(spinnerService.isLoading$ | async)">
    <mat-spinner diameter="50"></mat-spinner>
  </div>

  
  


  <nav aria-label="breadcrumb" class="mb-3">
    <ol class="breadcrumb custom-breadcrumb">
        <li class="breadcrumb-item">
            <a routerLink="/pedidos" class="d-flex align-items-center gap-1">
                <mat-icon class="breadcrumb-icon">home</mat-icon>
                <span>Inicio</span>
            </a>
        </li>

        <li class="breadcrumb-item">
            <a routerLink="/pedidos">Productos</a>
        </li>

        <li class="breadcrumb-item">
            Suministros
        </li>


    </ol>
</nav>

  <div class="card border-0 shadow-sm mb-4">
    <div class="card-body p-3">
      <div class="suministro" [class.blur]="(spinnerService.isLoading$ | async)">
      

        <!-- Barra de búsqueda y botones de acción -->
        <div class="herramientas">
          <mat-form-field appearance="outline">
            <mat-label>Buscar suministro</mat-label>
            <input matInput type="text" [(ngModel)]="filtro" (input)="filtrarItems()" />
          </mat-form-field>

          <!-- Botón para agregar suministro -->
          <button mat-raised-button color="primary" (click)="abrirModalAgregar()">
            <mat-icon>add</mat-icon> Agregar Suministro
          </button>

          <!-- Botón para crear nueva categoría -->
          <button mat-raised-button color="accent" (click)="abrirModalCrearCategoria()">
            <mat-icon>add_circle</mat-icon> Nueva Categoría
          </button>

          <div class="botones-accion">
            <!-- Menú de filtros por categorías -->
            <button mat-raised-button color="primary" [matMenuTriggerFor]="menu">
              <mat-icon>filter_list</mat-icon>
            </button>

            <!-- Menú desplegable para categorías -->
            <mat-menu #menu="matMenu">
              <button mat-menu-item (click)="aplicarFiltro('Todos')">Todos</button>
              <button mat-menu-item (click)="aplicarFiltro('Sin Stock')">Sin Stock</button>
              <button mat-menu-item *ngFor="let categoria of categorias" (click)="aplicarFiltro(categoria.nombre)">
                {{ categoria.nombre }}
              </button>
            </mat-menu>

            <!-- Botón para ordenar por stock -->
            <button mat-raised-button color="primary" (click)="ordenarPorStock()">
              <mat-icon>sort</mat-icon>
              {{ ordenStock === 'asc' ? '↑' : '↓' }}
            </button>

            <!-- Botón para actualizar items -->
            <button mat-raised-button color="accent" (click)="actualizarItems()">
              <mat-icon>refresh</mat-icon>
            </button>

            <!-- Botón para exportar a Excel -->
            <button mat-raised-button color="warn" (click)="exportarLista()">
              <mat-icon>file_download</mat-icon>
            </button>
          </div>
        </div>

        <!-- Tabla de Suministros -->
        <div class="table-container">
          <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">
            <!-- Columnas de la tabla -->
            <ng-container matColumnDef="nombre">
              <th mat-header-cell *matHeaderCellDef>Suministro</th>
              <td mat-cell *matCellDef="let item">{{ item.nombre }}</td>
            </ng-container>

            <ng-container matColumnDef="stock">
              <th mat-header-cell *matHeaderCellDef>Stock</th>
              <td mat-cell *matCellDef="let item">{{ item.stock }}</td>
            </ng-container>

            <ng-container matColumnDef="promedio">
              <th mat-header-cell *matHeaderCellDef>Promedio</th>
              <td mat-cell *matCellDef="let item">{{ item.stock }}</td>
            </ng-container>

            <ng-container matColumnDef="unit">
              <th mat-header-cell *matHeaderCellDef>Unit</th>
              <td mat-cell *matCellDef="let item">{{ item.unidad }}</td>
            </ng-container>

            <ng-container matColumnDef="categoria">
              <th mat-header-cell *matHeaderCellDef>Categoría</th>
              <td mat-cell *matCellDef="let item">{{ item.categoria }}</td>
            </ng-container>

            <ng-container matColumnDef="acciones">
              <th mat-header-cell *matHeaderCellDef>Acciones</th>
              <td mat-cell *matCellDef="let item">
                <button mat-icon-button color="primary" (click)="abrirModalEditar(item)">
                  <mat-icon>edit</mat-icon>
                </button>
                <button mat-icon-button color="warn" (click)="eliminarItem(item)">
                  <mat-icon>delete</mat-icon>
                </button>
              </td>
            </ng-container>

            <!-- Filas de la tabla -->
            <tr mat-header-row *matHeaderRowDef="columnas"></tr>
            <tr mat-row *matRowDef="let row; columns: columnas;"></tr>
          </table>
        </div>

        <!-- Paginación -->
        <mat-paginator [length]="itemsFiltrados.length" [pageSize]="itemsPorPagina" [pageIndex]="paginaActual"
          (page)="cambiarPagina($event)">
        </mat-paginator>
      </div>

    </div>
  </div>

</div>
