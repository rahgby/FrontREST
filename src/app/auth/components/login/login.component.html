<div class="login-container">
  <div class="login-box">
    <!-- Formulario de login con Bootstrap -->
    <div class="form-container">
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <h1>Iniciar sesión</h1>
        
        <!-- Mensaje de error general -->
        <div *ngIf="errorMessage" class="alert alert-danger">
          {{ errorMessage }}
        </div>
        
        <div class="form-group">
          <label for="codigo">Código</label>
          <input type="text" 
                 class="form-control" 
                 id="codigo" 
                 formControlName="codigo"
                 [ngClass]="{'is-invalid': (loginForm.get('codigo')?.invalid && loginForm.get('codigo')?.touched) || errorMessage}">
          <div class="invalid-feedback">
            <div *ngIf="loginForm.get('codigo')?.hasError('required')">
              El código es requerido
            </div>
          </div>
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" 
                 class="form-control" 
                 id="password" 
                 formControlName="password"
                 [ngClass]="{'is-invalid': (loginForm.get('password')?.invalid && loginForm.get('password')?.touched) || errorMessage}">
          <div class="invalid-feedback">
            <div *ngIf="loginForm.get('password')?.hasError('required')">
              La contraseña es requerida
            </div>
          </div>
        </div>

        <button class="login-button" type="submit" [disabled]="loginForm.invalid || loading">
          <span *ngIf="!loading">ENTRAR</span>
          <span *ngIf="loading">
            <i class="fas fa-spinner fa-spin"></i> Cargando...
          </span>
        </button>

        <a class="forgot-password">¿Olvidaste tu contraseña?</a>
      </form>
    </div>
    
    <!-- Overlay con imagen -->
    <div class="overlay-panel">
      <img src="assets/images/loza.jpg" alt="Fondo" class="background-image">
      <div class="overlay-gradient"></div>
      
    </div>
  </div>
</div>
